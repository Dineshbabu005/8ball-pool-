<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>8Ball Pro • Premium</title>
    <style>
        :root {
            --gold: #f0c040;
            --green: #22c55e;
            --felt: #0d5e2a;
            --wood: #3d1808;
            --bg: #0a0a0a;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            user-select: none;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
        #app {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            background: radial-gradient(ellipse at center, #1a1a1a 0%, #050505 100%);
        }
        #gc {
            z-index: 1;
            width: 100%;
            height: 100%;
        }
        #fx {
            z-index: 2;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #ui {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
        }
        #splash {
            position: absolute;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #000;
        }
        #splashBg {
            position: absolute;
            inset: 0;
            z-index: 0;
            width: 100%;
            height: 100%;
            opacity: .7;
        }
        .sp {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            width: 100%;
        }
        .sp-logo {
            font-size: clamp(42px, 12vw, 84px);
            font-weight: 900;
            letter-spacing: 3px;
            line-height: .9;
            text-align: center;
            background: linear-gradient(170deg, #fff8e0 0%, #ffe566 22%, #f0a000 52%, #b86000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
            filter: drop-shadow(0 0 35px rgba(240, 160, 0, .6));
            animation: logoGlow 3s ease-in-out infinite;
        }
        @keyframes logoGlow {
            0%,
            100% {
                filter: drop-shadow(0 0 30px rgba(240, 160, 0, .5));
            }
            50% {
                filter: drop-shadow(0 0 55px rgba(255, 200, 40, .85));
            }
        }
        .sp-sub {
            font-size: clamp(8px, 1.8vw, 11px);
            letter-spacing: 7px;
            color: rgba(255, 255, 255, .25);
            text-transform: uppercase;
            margin: 8px 0 20px;
        }
        .sp-ballrow {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            margin-bottom: 26px;
        }
        .sp-ballrow canvas {
            filter: drop-shadow(0 6px 12px rgba(0, 0, 0, .6));
            animation: floatBall 2.8s ease-in-out infinite;
        }
        .sp-ballrow canvas:nth-child(odd) {
            animation-delay: -1.3s;
        }
        .sp-ballrow canvas:nth-child(3n) {
            animation-delay: -0.7s;
        }
        @keyframes floatBall {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        .sp-btn {
            position: relative;
            padding: 16px 56px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #1a0800;
            overflow: hidden;
            pointer-events: all;
            transition: .2s;
            box-shadow: 0 0 50px rgba(240, 165, 0, .35);
        }
        .sp-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(170deg, #ffe97a, #f0a500 45%, #b06000);
        }
        .sp-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 52%;
            background: linear-gradient(180deg, rgba(255, 255, 255, .38), transparent);
            border-radius: 50px 50px 0 0;
        }
        .sp-btn span {
            position: relative;
            z-index: 2;
        }
        .sp-btn:active {
            transform: scale(.93);
        }
        .sp-modes {
            display: flex;
            gap: 10px;
            margin-top: 18px;
            flex-wrap: wrap;
            justify-content: center;
            pointer-events: all;
        }
        .sp-mode {
            padding: 9px 22px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(255, 255, 255, .04);
            color: rgba(255, 255, 255, .6);
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            backdrop-filter: blur(12px);
            letter-spacing: .5px;
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            pointer-events: none;
            display: none;
        }
        .hud-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: max(env(safe-area-inset-top), 10px) 14px 10px;
            background: linear-gradient(180deg, rgba(0, 0, 0, .92), transparent);
        }
        .pb {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }
        .pb.r {
            flex-direction: row-reverse;
        }
        .pav-wrap {
            position: relative;
            width: 42px;
            height: 42px;
            flex-shrink: 0;
        }
        .pav-ring {
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 60%, rgba(255, 255, 255, .25) 100%);
            animation: spin 4s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .pav {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 900;
            position: relative;
            z-index: 1;
        }
        .pav-y {
            background: radial-gradient(circle at 38% 32%, #70b0ff, #1d4ed8, #0a1870);
            box-shadow: 0 0 18px rgba(29, 78, 216, .6);
        }
        .pav-b {
            background: radial-gradient(circle at 38% 32%, #e070ff, #7c3aed, #3a0a80);
            box-shadow: 0 0 18px rgba(124, 58, 237, .6);
        }
        .pname {
            font-size: 11px;
            font-weight: 800;
            color: #fff;
        }
        .pbal {
            font-size: 10px;
            font-weight: 700;
            color: #4ade80;
            margin-top: 1px;
        }
        .pstrip {
            display: flex;
            gap: 3px;
            margin-top: 3px;
            flex-wrap: wrap;
            max-width: 80px;
        }
        .pip {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, .2);
            flex-shrink: 0;
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, .3), 0 1px 3px rgba(0, 0, 0, .5);
        }
        .chud {
            text-align: center;
            flex-shrink: 0;
            padding: 0 6px;
        }
        .pot-l {
            font-size: 7px;
            color: rgba(255, 255, 255, .3);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .pot-v {
            font-size: 19px;
            font-weight: 900;
            background: linear-gradient(180deg, #ffe97a, #f0a000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #turnpill {
            margin-top: 4px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, .1);
            background: rgba(0, 0, 0, .4);
        }
        .tdot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 1s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: .4;
                transform: scale(.65);
            }
        }
        #ctrl {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            pointer-events: all;
            display: none;
        }
        .ctrl-bg {
            background: linear-gradient(0deg, rgba(0, 0, 0, .96) 55%, transparent);
            padding: 10px 14px max(env(safe-area-inset-bottom), 14px);
        }
        .ctrl-row {
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 680px;
            margin: 0 auto;
        }
        .spin-col,
        .cue-col,
        .shoot-col {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .c-lbl {
            font-size: 7px;
            color: rgba(255, 255, 255, .3);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            margin-bottom: 3px;
            text-align: center;
        }
        .spin-ring {
            position: relative;
            width: 48px;
            height: 48px;
            cursor: crosshair;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, .08);
            background: rgba(255, 255, 255, .02);
        }
        .spin-ind {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 10px #fff, 0 0 22px rgba(255, 255, 255, .55);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
        }
        .pow-col {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .pow-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .pow-pct {
            font-size: 12px;
            font-weight: 900;
            color: var(--gold);
        }
        .pow-track {
            height: 9px;
            background: rgba(255, 255, 255, .05);
            border-radius: 5px;
            border: 1px solid rgba(255, 255, 255, .07);
            position: relative;
            cursor: pointer;
        }
        .pow-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            border-radius: 5px;
            background: linear-gradient(90deg, #22c55e, #ffe566 55%, #f97316 78%, #ef4444);
        }
        .pow-thumb {
            position: absolute;
            top: 50%;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%, #fff, #ccc);
            border: 2.5px solid var(--gold);
            transform: translate(-50%, -50%);
            box-shadow: 0 2px 8px rgba(0, 0, 0, .3);
        }
        #cuebtn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .1);
            background: rgba(255, 255, 255, .04);
            cursor: pointer;
            pointer-events: all;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }
        .cbn {
            font-size: 6px;
            color: rgba(255, 255, 255, .4);
            font-weight: 700;
        }
        #shootbtn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            pointer-events: all;
        }
        #shootbtn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: conic-gradient(from 200deg, #ffe97a, #f0a500, #c06800, #f0a500, #ffe97a);
            border-radius: 50%;
        }
        .stxt {
            position: relative;
            z-index: 2;
            color: #1a0800;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
        }
        #shootbtn:not(:disabled) {
            box-shadow: 0 0 0 3px rgba(240, 165, 0, .2), 0 6px 30px rgba(200, 100, 0, .6);
        }
        #shootbtn:disabled {
            opacity: .25;
            box-shadow: none;
        }
        #chalk {
            position: absolute;
            top: 76px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            pointer-events: none;
            opacity: 0;
            transition: opacity .25s;
            white-space: nowrap;
            font-size: clamp(14px, 5vw, 20px);
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 28px #ffe566;
        }
        #streakBadge {
            position: absolute;
            top: 120px;
            right: 14px;
            z-index: 15;
            pointer-events: none;
            opacity: 0;
            transition: all .3s;
            background: rgba(255, 80, 0, .9);
            color: #fff;
            padding: 5px 12px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 1px;
            box-shadow: 0 0 22px rgba(255, 80, 0, .5);
        }
        #shop {
            position: absolute;
            inset: 0;
            z-index: 80;
            display: none;
            flex-direction: column;
            background: linear-gradient(160deg, #04091a 0%, #080215 100%);
        }
        .sh-hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, .06);
            flex-shrink: 0;
            gap: 8px;
        }
        .sh-ttl {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #ffe566, #f0a000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }
        .sh-bal {
            font-size: 13px;
            font-weight: 800;
            color: #4ade80;
        }
        .sh-x {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(255, 255, 255, .06);
            color: rgba(255, 255, 255, .7);
            font-size: 16px;
            cursor: pointer;
            pointer-events: all;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sh-body {
            flex: 1;
            overflow-y: auto;
            padding: 10px 14px 30px;
        }
        .cg {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .cc {
            border-radius: 16px;
            padding: 14px;
            cursor: pointer;
            pointer-events: all;
            transition: .18s;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, .07);
            background: rgba(255, 255, 255, .03);
        }
        .cc.eq {
            border-color: rgba(255, 229, 102, .5) !important;
            background: rgba(255, 229, 102, .04) !important;
        }
        .cc-prev {
            display: block;
            width: 100%;
            height: 22px;
            margin-bottom: 10px;
        }
        .cc-nm {
            font-size: 12px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 2px;
        }
        .cc-tr {
            font-size: 7px;
            font-weight: 800;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            margin-bottom: 9px;
        }
        .btn-buy {
            background: linear-gradient(135deg, #ffe566, #f0a000);
            color: #1a0800;
            padding: 5px 12px;
            border-radius: 14px;
            border: none;
            font-size: 8px;
            font-weight: 900;
            cursor: pointer;
        }
        #winscr {
            position: absolute;
            inset: 0;
            z-index: 90;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .wbg {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, .88);
            backdrop-filter: blur(24px);
        }
        .wbox {
            position: relative;
            background: linear-gradient(155deg, #0c1c38, #140828);
            border-radius: 28px;
            padding: 36px 28px;
            text-align: center;
            max-width: 320px;
            width: 90%;
            animation: popIn .4s cubic-bezier(.175, .885, .32, 1.275);
        }
        @keyframes popIn {
            0% {
                transform: scale(.7);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .wico {
            font-size: 55px;
            margin-bottom: 8px;
        }
        .wttl {
            font-size: 28px;
            font-weight: 900;
            color: #fff;
        }
        .wamt {
            font-size: 50px;
            font-weight: 900;
            margin-bottom: 20px;
        }
        .wamt.pos {
            background: linear-gradient(135deg, #ffe566, #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .wamt.neg {
            background: linear-gradient(135deg, #ef4444, #7f1d1d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .wb {
            padding: 12px 26px;
            border-radius: 50px;
            border: none;
            font-size: 12px;
            font-weight: 900;
            cursor: pointer;
            pointer-events: all;
            letter-spacing: .8px;
            text-transform: uppercase;
        }
        .wb-g {
            background: linear-gradient(175deg, #ffe97a, #f0a500, #b06000);
            color: #1a0800;
            box-shadow: 0 4px 24px rgba(240, 165, 0, .5);
        }
        .wb-o {
            background: rgba(255, 255, 255, .07);
            color: rgba(255, 255, 255, .8);
            border: 1px solid rgba(255, 255, 255, .12);
        }
    </style>
</head>
<body>
    <div id="app">
        <canvas id="gc"></canvas>
        <canvas id="fx"></canvas>
        <div id="ui">
            <div id="splash">
                <canvas id="splashBg"></canvas>
                <div class="sp">
                    <div class="sp-logo">8BALL<br>PRO</div>
                    <div class="sp-sub">Premium Pool · Real Stakes · Elite Design</div>
                    <div class="sp-ballrow" id="spballs"></div>
                    <button class="sp-btn" onclick="APP.start()"><span>PLAY NOW</span></button>
                    <div class="sp-modes">
                        <div class="sp-mode">🎱 vs Bot $5</div>
                        <div class="sp-mode">🌍 Multiplayer</div>
                        <div class="sp-mode">🏆 Tournament</div>
                    </div>
                </div>
            </div>
            <div id="hud">
                <div class="hud-bar">
                    <div class="pb"><div class="pav-wrap"><div class="pav-ring"></div><div class="pav pav-y">YOU</div></div><div><div class="pname">You</div><div class="pbal" id="hudbal">$25.00</div><div class="pstrip" id="ystrip"></div></div></div>
                    <div class="chud"><div class="pot-l">Prize Pot</div><div class="pot-v">$9.50</div><div id="turnpill"><div class="tdot"></div><span id="turntxt">YOUR TURN</span></div></div>
                    <div class="pb r"><div class="pav-wrap"><div class="pav-ring"></div><div class="pav pav-b">BOT</div></div><div style="text-align:right"><div class="pname">Pro Bot</div><div class="pbal" style="color:#f87171">Rival</div><div class="pstrip" id="bstrip" style="justify-content:flex-end"></div></div></div>
                </div>
            </div>
            <div id="chalk"></div>
            <div id="streakBadge"></div>
            <div id="ctrl">
                <div class="ctrl-bg"><div class="ctrl-row">
                    <div class="spin-col"><div class="c-lbl">Spin</div><div class="spin-ring" id="spinring"><canvas id="spinc" width="48" height="48"></canvas><div class="spin-ind" id="spind" style="left:50%;top:50%"></div></div></div>
                    <div class="pow-col"><div class="pow-top"><span class="c-lbl">Power</span><span class="pow-pct" id="pwpct">40%</span></div><div class="pow-track" id="pwtrack"><div class="pow-fill" id="pwfill" style="width:40%"></div><div class="pow-thumb" id="pwthumb" style="left:40%"></div></div></div>
                    <div class="cue-col"><div class="c-lbl">Cue</div><div id="cuebtn" onclick="APP.openShop()"><canvas id="cuemini" width="36" height="10"></canvas><div class="cbn" id="cuemname">Classic</div></div></div>
                    <div class="shoot-col"><div class="c-lbl">Fire</div><button id="shootbtn" onclick="APP.shoot()"><span class="stxt">SHOOT</span></button></div>
                </div></div>
            </div>
            <div id="shop">
                <div class="sh-hdr"><div class="sh-ttl" id="shopTitle" onclick="APP.toggleDevMode()">CUE SHOP</div><div class="sh-bal">$<span id="shopbal">25.00</span></div><button class="btn-dev" id="devBtn" onclick="APP.openDevPanel()" style="display:none; background:rgba(168,85,247,.2); color:#a855f7; border:1px solid rgba(168,85,247,.3); border-radius:12px; padding:4px 10px; font-size:8px; font-weight:900; cursor:pointer;">🔧 DEV</button><div class="sh-x" onclick="APP.closeShop()">✕</div></div>
                <div class="sh-body" id="shopbody"></div>
            </div>
            <div id="devPanel" style="position:absolute;inset:0;z-index:85;display:none;flex-direction:column;background:rgba(4,2,20,.97);backdrop-filter:blur(16px);">
                <div class="dv-hdr" style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.06);"><div style="font-size:16px;font-weight:900;color:#a855f7;">🧬 CUE BUILDER</div><div class="sh-x" onclick="APP.closeDevPanel()">✕</div></div>
                <div style="flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px;">
                    <div><label>Name</label><input id="dvName" value="Custom Cue" maxlength="18"></div>
                    <div><label>Tier</label><select id="dvTier"><option>Wood</option><option>Rare</option><option>Epic</option><option>Legendary</option><option>Diamond</option><option>Mythic</option></select></div>
                    <div><label>Price</label><input id="dvPrice" type="number" value="9.99" step="0.01"></div>
                    <div><label>Glow</label><input id="dvGlow" type="color" value="#00e5ff"></div>
                    <div><label>Color1</label><input id="dvC1" type="color" value="#ffe0c0"></div>
                    <div><label>Color2</label><input id="dvC2" type="color" value="#c09040"></div>
                    <div><label>Ring</label><input id="dvRing" type="color" value="#c0a040"></div>
                    <div style="display:flex;gap:8px;"><button onclick="APP.saveCustomCue()" style="background:#a855f7;color:#fff;padding:8px 16px;border-radius:20px;border:none;font-weight:900;">💾 Save</button><button onclick="APP.testCustomCue()" style="background:rgba(34,197,94,.2);color:#22c55e;padding:8px 16px;border-radius:20px;border:none;font-weight:900;">🎯 Test</button></div>
                </div>
            </div>
            <div id="winscr"><div class="wbg"></div><div class="wbox"><div class="wico" id="wico">🎉</div><div class="wttl" id="wttl">YOU WON!</div><div class="wsub" id="wsub">Credited to your wallet</div><div class="wamt pos" id="wamt">+$9.50</div><div class="wbtns"><button class="wb wb-g" onclick="APP.restart()">Play Again</button><button class="wb wb-o" onclick="APP.lobby()">Lobby</button></div></div></div>
        </div>
    </div>
    <script>
        const APP = (() => {
            const BCOLS = [null, '#f5d800', '#1060c0', '#c62828', '#6a1b9a', '#e05000', '#1e7a2a', '#880e4f', '#111', '#f5d800', '#1060c0', '#c62828', '#6a1b9a', '#e05000', '#1e7a2a', '#880e4f'];
            const PCOLS = ['', '#f5d800', '#1060c0', '#c62828', '#6a1b9a', '#e05000', '#1e7a2a', '#880e4f', '#222', '#f5d800', '#1060c0', '#c62828', '#6a1b9a', '#e05000', '#1e7a2a', '#880e4f'];
            const BUILTIN_CUES = [
                { id: 0, name: 'Classic Maple', tier: 'Wood', price: 0, owned: true, power: 40, aim: 40, spin: 35, time: 40, glow: 'rgba(140,180,255,0)', c1: '#f5e6c8', c2: '#b8945c', ring: '#c8a060' },
                { id: 1, name: 'Neon Viper', tier: 'Rare', price: 4.99, owned: false, power: 60, aim: 65, spin: 52, time: 55, glow: 'rgba(0,229,255,.5)', c1: '#e8faff', c2: '#3bc0e8', ring: '#00e5ff' },
                { id: 2, name: 'Predator X', tier: 'Rare', price: 6.99, owned: false, power: 65, aim: 60, spin: 55, time: 58, glow: 'rgba(255,96,32,.45)', c1: '#ffe0c8', c2: '#e8481a', ring: '#ff6020' },
                { id: 3, name: 'Neon Blaze', tier: 'Epic', price: 12.99, owned: false, power: 72, aim: 70, spin: 68, time: 65, glow: 'rgba(255,64,192,.55)', c1: '#ffe0f4', c2: '#e030a0', ring: '#ff40c0' },
                { id: 4, name: 'Thunder Bolt', tier: 'Epic', price: 14.99, owned: false, power: 75, aim: 68, spin: 62, time: 70, glow: 'rgba(250,204,21,.55)', c1: '#fffde0', c2: '#d4a80a', ring: '#facc15' },
                { id: 5, name: 'Shadow Phantom', tier: 'Legendary', price: 19.99, owned: false, power: 80, aim: 78, spin: 75, time: 76, glow: 'rgba(180,180,180,.55)', c1: '#e8e8e8', c2: '#3a3a3a', ring: '#aaa' },
                { id: 6, name: 'Phoenix Fire', tier: 'Legendary', price: 22.99, owned: false, power: 82, aim: 80, spin: 78, time: 80, glow: 'rgba(255,102,0,.6)', c1: '#ffe8d0', c2: '#c0400a', ring: '#ff6600' },
                { id: 7, name: 'Diamond Edge', tier: 'Diamond', price: 29.99, owned: false, power: 85, aim: 85, spin: 82, time: 84, glow: 'rgba(103,232,249,.65)', c1: '#e0faff', c2: '#2db8c8', ring: '#67e8f9' },
                { id: 8, name: 'Royal Gold', tier: 'Diamond', price: 34.99, owned: false, power: 88, aim: 86, spin: 84, time: 88, glow: 'rgba(255,215,0,.65)', c1: '#fffde0', c2: '#b8860b', ring: '#ffd700' },
                { id: 9, name: 'Void Reaper', tier: 'Mythic', price: 49.99, owned: false, power: 92, aim: 90, spin: 88, time: 90, glow: 'rgba(255,32,64,.75)', c1: '#ffe0e0', c2: '#7a0010', ring: '#ff2040' },
                { id: 10, name: 'Cosmic Ray', tier: 'Mythic', price: 54.99, owned: false, power: 94, aim: 92, spin: 90, time: 93, glow: 'rgba(192,132,252,.75)', c1: '#f3e8ff', c2: '#5c1da0', ring: '#c084fc' },
            ];
            let CUES = [...BUILTIN_CUES];
            let gc, fc, ctx, fctx, W, H, DPR;
            let TW, TH, BR, PR, GAP, TX, TY, PAD = {};
            let balls = [], cb, pockets = [];
            let angle = 0, power = .4, sx = 0, sy = 0;
            let shooting = false, over = false, yourTurn = true;
            let yN = [1,2,3,4,5,6,7], bN = [9,10,11,12,13,14,15];
            let parts = [], raf, spRaf, spT = 0;
            let eq = 0, bal = 25;
            let tableImg = null;
            let streak = 0, maxStreak = 0;
            let devMode = false;

            function setup() {
                gc = document.getElementById('gc');
                fc = document.getElementById('fx');
                DPR = Math.min(window.devicePixelRatio || 1, 2);
                doResize();
                ctx = gc.getContext('2d');
                fctx = fc.getContext('2d');
                ctx.scale(DPR, DPR);
                fctx.scale(DPR, DPR);
                window.addEventListener('resize', () => { doResize(); bakeTable(); });
                buildSpinCanvas();
                buildSplash();
                loadCustomCues();
            }

            function doResize() {
                W = window.innerWidth; H = window.innerHeight;
                [gc, fc].forEach(c => { c.width = W * DPR; c.height = H * DPR; c.style.width = W + 'px'; c.style.height = H + 'px'; });
                TW = W > H ? Math.min(W * .87, 720) : W * .93;
                TH = TW * .505;
                BR = TW * .033;
                PR = BR * 2.4;
                GAP = BR * 2.08;
                TX = (W - TW) / 2; TY = (H - TH) / 2 - 14;
                PAD = { L: TX + TW * .075, R: TX + TW - TW * .075, T: TY + TH * .125, B: TY + TH - TH * .125 };
                pockets = [
                    { x: TX + TW * .043, y: TY + TH * .073 }, { x: TX + TW * .5, y: TY + TH * .022 },
                    { x: TX + TW * .957, y: TY + TH * .073 }, { x: TX + TW * .043, y: TY + TH * .927 },
                    { x: TX + TW * .5, y: TY + TH * .978 }, { x: TX + TW * .957, y: TY + TH * .927 }
                ];
            }

            function buildSplash() {
                const sc = document.getElementById('splashBg');
                sc.width = window.innerWidth; sc.height = window.innerHeight;
                const sx2 = sc.getContext('2d');
                function loop() {
                    if (document.getElementById('splash').style.display === 'none') return;
                    sx2.fillStyle = '#000'; sx2.fillRect(0, 0, sc.width, sc.height);
                    for (let i = 0; i < 9; i++) {
                        const bx = sc.width * .5 + Math.sin(spT * .38 + i * 1.1) * sc.width * .44;
                        const by = sc.height * .44 + Math.cos(spT * .32 + i * .98) * sc.height * .34;
                        const r = 80 + Math.sin(spT + i) * 50;
                        const g = sx2.createRadialGradient(bx, by, 0, bx, by, r);
                        g.addColorStop(0, `hsla(${[200,260,35,300,170,60,330,45,280][i]},80%,45%,.15)`);
                        g.addColorStop(1, 'transparent');
                        sx2.fillStyle = g; sx2.beginPath(); sx2.arc(bx, by, r, 0, Math.PI*2); sx2.fill();
                    }
                    spT += .013;
                    spRaf = requestAnimationFrame(loop);
                }
                loop();
                const row = document.getElementById('spballs');
                row.innerHTML = '';
                [1,3,5,8,9,11,14].forEach(n => {
                    const c = document.createElement('canvas'); c.width=34; c.height=34;
                    drawBall(c.getContext('2d'),17,17,13,n); row.appendChild(c);
                });
            }

            function bakeTable() {
                const oc = document.createElement('canvas');
                oc.width = W * DPR; oc.height = H * DPR;
                const c = oc.getContext('2d'); c.scale(DPR, DPR);
                drawBG(c); drawTable(c);
                tableImg = oc;
            }

            function drawBG(c) {
                const g = c.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.85);
                g.addColorStop(0,'#141410'); g.addColorStop(.5,'#0a0a08'); g.addColorStop(1,'#030302');
                c.fillStyle = g; c.fillRect(0,0,W,H);
            }

            function drawTable(c) {
                const x=TX,y=TY,w=TW,h=TH;
                c.shadowColor='rgba(0,0,0,.95)'; c.shadowBlur=90; c.shadowOffsetY=22;
                c.beginPath(); rr(c,x-40,y-40,w+80,h+80,28); c.fillStyle='#040100'; c.fill();
                c.shadowColor='transparent';
                const wg = c.createLinearGradient(x-40,y-40,x+w+40,y+h+40);
                ['#2a1008','#4a2010','#5c2a12','#6e3414','#5c2a12','#4a2010','#2a1008'].forEach((col,i)=>wg.addColorStop(i/6,col));
                c.beginPath(); rr(c,x-40,y-40,w+80,h+80,28); c.fillStyle=wg; c.fill();
                c.save(); c.beginPath(); rr(c,x-40,y-40,w+80,h+80,28); c.clip();
                for(let i=0;i<22;i++){c.beginPath();c.moveTo(x-40+i*10,y-40);c.lineTo(x-40+i*10+4,y+h+40);c.strokeStyle='rgba(0,0,0,.05)';c.lineWidth=2+Math.sin(i*.7)*2;c.stroke();}
                c.restore();
                const fg = c.createRadialGradient(x+w*.5,y+h*.42,0,x+w*.5,y+h*.52,Math.max(w,h)*.72);
                fg.addColorStop(0,'#1a8040'); fg.addColorStop(.35,'#167034'); fg.addColorStop(.7,'#105828'); fg.addColorStop(1,'#0c401c');
                c.beginPath(); rr(c,x,y,w,h,5); c.fillStyle=fg; c.fill();
                pockets.forEach(p=>{c.beginPath();c.arc(p.x,p.y,PR,0,Math.PI*2);c.fillStyle='rgba(0,0,0,.7)';c.fill();});
            }

            function rr(c,x,y,w,h,r){c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}

            function drawBall(c,x,y,r,num){
                c.save();
                const col = BCOLS[num];
                c.shadowColor='rgba(0,0,0,.55)'; c.shadowBlur=r*.7; c.shadowOffsetX=r*.1; c.shadowOffsetY=r*.25;
                const bg = c.createRadialGradient(x-r*.33,y-r*.38,r*.03,x+r*.1,y+r*.12,r*1.08);
                if(num===0){bg.addColorStop(0,'#fff');bg.addColorStop(.5,'#ebebeb');bg.addColorStop(1,'#a0a0a0');}
                else{bg.addColorStop(0,lt(col,.6));bg.addColorStop(.42,col);bg.addColorStop(1,dk(col,.58));}
                c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.fillStyle=bg;c.fill();
                c.shadowColor='transparent';
                if(num>=9){c.save();c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.clip();c.fillStyle='rgba(255,255,255,.94)';c.fillRect(x-r,y-r*.44,r*2,r*.88);c.restore();}
                if(num>0){c.beginPath();c.arc(x,y,r*.37,0,Math.PI*2);c.fillStyle='rgba(255,255,255,.96)';c.fill();c.font=`900 ${Math.max(7,~~(r*.46))}px Arial`;c.fillStyle='#0c0c0c';c.textAlign='center';c.textBaseline='middle';c.fillText(num,x,y+r*.04);}
                const s1=c.createRadialGradient(x-r*.3,y-r*.37,0,x-r*.08,y-r*.15,r*.64);s1.addColorStop(0,'rgba(255,255,255,.66)');s1.addColorStop(1,'rgba(255,255,255,0)');c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.fillStyle=s1;c.fill();
                c.restore();
            }
            function lt(h,f){const{r,g,b}=hr(h);return`rgb(${Math.min(255,~~(r+f*200))},${Math.min(255,~~(g+f*200))},${Math.min(255,~~(b+f*200))})`}
            function dk(h,f){const{r,g,b}=hr(h);return`rgb(${~~(r*(1-f))},${~~(g*(1-f))},${~~(b*(1-f))})`}
            function hr(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)}}

            function pocketOpenWall(bx,by){
                for(let p of pockets){
                    const dx = Math.abs(bx-p.x), dy = Math.abs(by-p.y);
                    if(dx < PR*1.8 && dy < PR*1.8) return true;
                }
                return false;
            }

            function physics(){
                let moving = false;
                balls.forEach(b=>{
                    if(b.sunk)return;
                    b.x+=b.vx; b.y+=b.vy;
                    b.vx*=.9888; b.vy*=.9888;
                    if(Math.abs(b.vx)<.06)b.vx=0; if(Math.abs(b.vy)<.06)b.vy=0;
                    if(b.vx||b.vy)moving=true;
                    // wall collision with pocket opening
                    if(b.x-BR<PAD.L && !pocketOpenWall(b.x,b.y)){b.x=PAD.L+BR;b.vx=Math.abs(b.vx)*.7;}
                    if(b.x+BR>PAD.R && !pocketOpenWall(b.x,b.y)){b.x=PAD.R-BR;b.vx=-Math.abs(b.vx)*.7;}
                    if(b.y-BR<PAD.T && !pocketOpenWall(b.x,b.y)){b.y=PAD.T+BR;b.vy=Math.abs(b.vy)*.7;}
                    if(b.y+BR>PAD.B && !pocketOpenWall(b.x,b.y)){b.y=PAD.B-BR;b.vy=-Math.abs(b.vy)*.7;}
                    pockets.forEach(p=>{
                        if(Math.hypot(b.x-p.x,b.y-p.y)<PR){b.sunk=true;b.vx=0;b.vy=0;spawnPocket(p.x,p.y);onSunk(b);}
                    });
                });
                for(let i=0;i<balls.length;i++){
                    for(let j=i+1;j<balls.length;j++){
                        const a=balls[i],b2=balls[j]; if(a.sunk||b2.sunk)continue;
                        const dx=b2.x-a.x,dy=b2.y-a.y,d=Math.hypot(dx,dy);
                        if(d<BR*2&&d>.001){
                            const nx=dx/d,ny=dy/d,ov=(BR*2-d)/2;
                            a.x-=nx*ov;a.y-=ny*ov;b2.x+=nx*ov;b2.y+=ny*ov;
                            const dot=(a.vx-b2.vx)*nx+(a.vy-b2.vy)*ny;
                            if(dot>0){a.vx-=dot*nx*.96;a.vy-=dot*ny*.96;b2.vx+=dot*nx*.96;b2.vy+=dot*ny*.96;}
                        }
                    }
                }
                if(shooting&&!moving){shooting=false;switchTurn();}
            }

            function onSunk(b){
                if(b.num===0){chalk('SCRATCH!','#ef4444');setTimeout(()=>{b.sunk=false;b.x=TX+TW*.27;b.y=TY+TH*.5;b.vx=0;b.vy=0;},900);return;}
                if(b.num===8){const w=yN.filter(n=>!balls.find(bb=>bb.num===n&&bb.sunk)).length===0;setTimeout(()=>endGame(w),700);return;}
                yN=yN.filter(n=>n!==b.num);bN=bN.filter(n=>n!==b.num);
                streak++; if(streak>maxStreak)maxStreak=streak;
                updateStreakBadge();
                chalk(streak>=3?`🔥 ${streak}x STREAK!`:'POTTED!','#22c55e');
                updateStrips();
            }

            function updateStreakBadge(){document.getElementById('streakBadge').style.opacity=streak>=3?'1':'0';}
            function switchTurn(){yourTurn=!yourTurn;updateHUD();if(!yourTurn&&!over)setTimeout(botShoot,900+Math.random()*700);}
            function botShoot(){if(over||yourTurn)return;const tgts=balls.filter(b=>!b.sunk&&b.num!==0&&(bN.includes(b.num)||(bN.length===0&&b.num===8)));if(!tgts.length)return;const t=tgts[~~(Math.random()*Math.min(2,tgts.length))];const a=Math.atan2(t.y-cb.y,t.x-cb.x)+(Math.random()-.5)*.3;const cue=CUES[eq];cb.vx=Math.cos(a)*(.4+Math.random()*.5)*(8+cue.power*.07);cb.vy=Math.sin(a)*(.4+Math.random()*.5)*(8+cue.power*.07);shooting=true;}

            function drawAim(){
                if(!yourTurn||shooting||over||!cb||cb.sunk)return;
                const cos=Math.cos(angle),sin2=Math.sin(angle);
                let t=TW*.62;
                if(cos<0)t=Math.min(t,(PAD.L-cb.x)/cos);if(cos>0)t=Math.min(t,(PAD.R-cb.x)/cos);
                if(sin2<0)t=Math.min(t,(PAD.T-cb.y)/sin2);if(sin2>0)t=Math.min(t,(PAD.B-cb.y)/sin2);
                const ex=cb.x+cos*t,ey=cb.y+sin2*t;
                ctx.save();ctx.globalAlpha=.2;ctx.beginPath();ctx.arc(ex,ey,BR*1.1,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.restore();
                const pull=14+power*34;
                ctx.save();drawCueMini(ctx,cb.x-cos*(BR+4+pull),cb.y-sin2*(BR+4+pull),TW*.34,angle+Math.PI);ctx.restore();
            }

            function drawCueMini(c,ox,oy,L,a){
                const cue=CUES[eq];
                c.shadowColor=cue.glow;c.shadowBlur=12;
                c.beginPath();c.moveTo(ox,oy);c.lineTo(ox+Math.cos(a)*L*.7,oy+Math.sin(a)*L*.7);c.strokeStyle='transparent';c.lineWidth=1;c.stroke();
                c.shadowColor='transparent';c.shadowBlur=0;
                const segs=[{p:.02,w:4,col:'#f8f8f8'},{p:.35,w:5,col:cue.c1},{p:.06,w:5.5,col:cue.c2},{p:.28,w:9,col:'#140600'}];
                let cur=0; segs.forEach(s=>{c.beginPath();c.moveTo(ox+Math.cos(a)*cur,oy+Math.sin(a)*cur);cur+=s.p*L;c.lineTo(ox+Math.cos(a)*cur,oy+Math.sin(a)*cur);c.strokeStyle=s.col;c.lineWidth=s.w;c.stroke();});
            }

            function loop(){
                raf=requestAnimationFrame(loop);
                ctx.clearRect(0,0,W,H);
                if(tableImg)ctx.drawImage(tableImg,0,0,W*DPR,H*DPR,0,0,W,H);
                drawAim();
                [...balls].filter(b=>!b.sunk).sort((a,b2)=>a.y-b2.y).forEach(b=>{if(b.num!==0)drawBall(ctx,b.x,b.y,BR,b.num);});
                if(cb&&!cb.sunk)drawBall(ctx,cb.x,cb.y,BR,0);
                physics();
            }

            function initBalls(){balls=[];const sx2=TX+TW*.655,sy2=TY+TH*.5;[[8],[1,9],[2,10,3],[11,4,12,5],[6,13,7,14,15]].forEach((row,ri)=>{row.forEach((num,ci)=>{balls.push({num,x:sx2+ri*GAP*.866,y:sy2+(ci-(row.length-1)/2)*GAP,vx:0,vy:0,sunk:false});});});cb={num:0,x:TX+TW*.27,y:TY+TH*.5,vx:0,vy:0,sunk:false};balls.push(cb);}
            function updateStrips(){document.getElementById('ystrip').innerHTML=yN.map(n=>`<div class="pip" style="background:${PCOLS[n]}"></div>`).join('');document.getElementById('bstrip').innerHTML=bN.map(n=>`<div class="pip" style="background:${PCOLS[n]}"></div>`).join('');}
            function updateHUD(){document.getElementById('turntxt').textContent=yourTurn?'YOUR TURN':'BOT THINKING...';document.getElementById('shootbtn').disabled=!yourTurn||shooting||over;}
            let chT; function chalk(msg,col='#ffe566'){const el=document.getElementById('chalk');el.textContent=msg;el.style.color=col;el.style.textShadow=`0 0 28px ${col}`;el.style.opacity='1';clearTimeout(chT);chT=setTimeout(()=>el.style.opacity='0',1600);}
            function buildSpinCanvas(){const c=document.getElementById('spinc'),cx=c.getContext('2d');const g=cx.createRadialGradient(16,14,0,24,24,22);g.addColorStop(0,'#f0f0f0');g.addColorStop(.5,'#c8c8c8');g.addColorStop(1,'#888');cx.beginPath();cx.arc(24,24,22,0,Math.PI*2);cx.fillStyle=g;cx.fill();}
            function spawnPocket(x,y){for(let i=0;i<20;i++){const a=Math.random()*Math.PI*2,spd=2+Math.random()*5;parts.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-3,life:1,decay:.03,r:2+Math.random()*6});}}
            function endGame(win){over=true;document.getElementById('winscr').style.display='flex';document.getElementById('wico').textContent=win?'🎉':'😔';document.getElementById('wttl').textContent=win?'YOU WON!':'YOU LOST';const wa=document.getElementById('wamt');wa.textContent=(win?'+':'')+'$'+(win?9.5:5).toFixed(2);wa.className='wamt '+(win?'pos':'neg');bal+=win?9.5:-5;streak=0;maxStreak=0;updateStreakBadge();updateHUD();}
            function loadCustomCues(){try{const s=localStorage.getItem('8ball_custom_v3');if(s){const c=JSON.parse(s);c.forEach((x,i)=>{x.id=100+i;x._custom=true;});CUES=[...BUILTIN_CUES,...c];}}catch(e){}}
            function saveCustomCues(){localStorage.setItem('8ball_custom_v3',JSON.stringify(CUES.filter(c=>c._custom)));}
            function renderShop(){const body=document.getElementById('shopbody');const tiers=['Wood','Rare','Epic','Legendary','Diamond','Mythic','Custom'];let h='';tiers.forEach(t=>{const cs=CUES.filter(c=>c.tier===t);if(!cs.length)return;h+=`<div class="tier-h" style="color:${cs[0].glow||'#a855f7'}">${t}</div><div class="cg">`;cs.forEach(cue=>{const eqq=eq===cue.id,ow=cue.owned;h+=`<div class="cc ${eqq?'eq':''}" onclick="APP.equipCue(${cue.id})"><canvas class="cc-prev" id="sc${cue.id}" height="22"></canvas><div class="cc-nm">${cue.name}</div><div class="cc-ft">${eqq?'<span class="cc-pr" style="color:#ffe566">Active</span>':ow?`<button class="btn-buy" onclick="event.stopPropagation();APP.equipCue(${cue.id})">Equip</button>`:`<button class="btn-buy" onclick="event.stopPropagation();APP.buyCue(${cue.id})">Buy $${cue.price.toFixed(2)}</button>`}</div></div>`;});h+=`</div>`;});body.innerHTML=h;document.getElementById('shopbal').textContent=bal.toFixed(2);setTimeout(()=>{CUES.forEach(cue=>{const el=document.getElementById('sc'+cue.id);if(!el)return;el.width=el.offsetWidth||120;const c=el.getContext('2d');c.save();c.shadowColor=cue.glow;c.shadowBlur=8;drawCueMini(c,2,el.height/2,el.width-4,0);c.restore();});},60);}
            function updateMini(){const cue=CUES[eq];const mc=document.getElementById('cuemini'),c=mc.getContext('2d');c.clearRect(0,0,36,10);c.save();c.shadowColor=cue.glow;c.shadowBlur=5;drawCueMini(c,0,5,36,0);c.restore();document.getElementById('cuemname').textContent=cue.name;}
            function bindControls(){
                const pwtrack=document.getElementById('pwtrack'),pwfill=document.getElementById('pwfill'),pwthumb=document.getElementById('pwthumb'),pwpct=document.getElementById('pwpct');
                let isPulling=false;
                window.addEventListener('mousemove',e=>{if(!shooting&&yourTurn&&cb){angle=Math.atan2(e.clientY-cb.y,e.clientX-cb.x);}});
                window.addEventListener('touchmove',e=>{if(!shooting&&yourTurn&&cb&&e.touches[0]){const t=e.touches[0];angle=Math.atan2(t.clientY-cb.y,t.clientX-cb.x);}});
                pwtrack.addEventListener('mousedown',()=>isPulling=true);pwtrack.addEventListener('touchstart',()=>isPulling=true);
                window.addEventListener('mouseup',()=>isPulling=false);window.addEventListener('touchend',()=>isPulling=false);
                pwtrack.addEventListener('mousemove',e=>{if(!isPulling)return;const r=pwtrack.getBoundingClientRect();power=Math.max(.08,Math.min(1,(e.clientX-r.left)/r.width));pwfill.style.width=power*100+'%';pwthumb.style.left=power*100+'%';pwpct.textContent=(power*100).toFixed(0)+'%';});
                document.getElementById('spinring').addEventListener('mousemove',e=>{if(!shooting&&yourTurn){const r=document.getElementById('spinring').getBoundingClientRect();sx=Math.max(-1,Math.min(1,(e.clientX-r.left-24)/24));sy=Math.max(-1,Math.min(1,(e.clientY-r.top-24)/24));document.getElementById('spind').style.left=(50+sx*40)+'%';document.getElementById('spind').style.top=(50+sy*40)+'%';}});
                window.addEventListener('keydown',e=>{if(e.code==='Space'&&yourTurn&&!shooting&&!over){e.preventDefault();APP.shoot();}});
            }

            return {
                init:setup,
                start(){cancelAnimationFrame(spRaf);document.getElementById('splash').style.display='none';document.getElementById('hud').style.display='block';document.getElementById('ctrl').style.display='block';bakeTable();initBalls();updateStrips();updateHUD();updateMini();bindControls();loop();},
                shoot(){if(!yourTurn||shooting||over||!cb||cb.sunk)return;const cue=CUES[eq];cb.vx=Math.cos(angle)*power*(8+cue.power*.07)+sx*1.5;cb.vy=Math.sin(angle)*power*(8+cue.power*.07)+sy*1.5;shooting=true;chalk('SHOOT!');},
                openShop(){renderShop();document.getElementById('shop').style.display='flex';},
                closeShop(){document.getElementById('shop').style.display='none';updateMini();},
                equipCue(id){eq=id;renderShop();updateMini();},
                buyCue(id){const cue=CUES.find(c=>c.id===id);if(!cue||bal<cue.price){chalk('Not enough money','#ef4444');return;}bal-=cue.price;cue.owned=true;eq=id;renderShop();updateMini();chalk('Purchased!','#22c55e');},
                restart(){document.getElementById('winscr').style.display='none';balls=[];yN=[1,2,3,4,5,6,7];bN=[9,10,11,12,13,14,15];over=false;yourTurn=true;shooting=false;angle=0;streak=0;maxStreak=0;initBalls();updateStrips();updateHUD();},
                lobby(){document.getElementById('winscr').style.display='none';document.getElementById('hud').style.display='none';document.getElementById('ctrl').style.display='none';document.getElementById('splash').style.display='flex';cancelAnimationFrame(raf);buildSplash();},
                toggleDevMode(){devMode=!devMode;document.getElementById('devBtn').style.display=devMode?'inline-block':'none';chalk(devMode?'🔓 DEV MODE ON':'🔒 DEV MODE OFF',devMode?'#a855f7':'#888');renderShop();},
                openDevPanel(){document.getElementById('devPanel').style.display='flex';},
                closeDevPanel(){document.getElementById('devPanel').style.display='none';},
                saveCustomCue(){const data={name:document.getElementById('dvName').value,tier:document.getElementById('dvTier').value,price:parseFloat(document.getElementById('dvPrice').value),glow:document.getElementById('dvGlow').value+'80',c1:document.getElementById('dvC1').value,c2:document.getElementById('dvC2').value,ring:document.getElementById('dvRing').value,power:55,aim:55,spin:50,time:50,owned:true};data.id=Math.max(100,...CUES.map(c=>c.id))+1;data._custom=true;CUES.push(data);saveCustomCues();renderShop();APP.closeDevPanel();chalk('Cue saved!','#22c55e');},
                testCustomCue(){const data={name:document.getElementById('dvName').value,tier:document.getElementById('dvTier').value,price:0,glow:document.getElementById('dvGlow').value+'80',c1:document.getElementById('dvC1').value,c2:document.getElementById('dvC2').value,ring:document.getElementById('dvRing').value,power:70,aim:70,spin:65,time:65,owned:true};data.id=9999;CUES.push(data);eq=9999;updateMini();renderShop();APP.closeDevPanel();chalk('Testing '+data.name,'#a855f7');}
            };
        })();
        window.onload = APP.init;
    </script>
</body>
</html>
