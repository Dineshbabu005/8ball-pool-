<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8-Ball Pro Multi-Player</title>
    <style>
        :root { --gold: #ffe566; --bg: #060e06; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; cursor: crosshair; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* HUD */
        #hud { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; pointer-events: auto; }
        .stat-box { background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
        #turntxt { color: var(--gold); font-weight: bold; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Controls */
        #ctrl { position: absolute; bottom: 20px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 30px; pointer-events: auto; }
        .pw-container { width: 300px; height: 12px; background: #222; border-radius: 6px; position: relative; border: 1px solid #444; }
        #pwfill { height: 100%; background: linear-gradient(90deg, #22c55e, #eab308, #ef4444); border-radius: 6px; width: 40%; transition: width 0.1s; }
        
        .btn-shoot { background: var(--gold); color: #000; border: none; padding: 12px 30px; border-radius: 25px; font-weight: 900; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 15px rgba(255,229,102,0.4); }
        .btn-shoot:disabled { background: #444; color: #888; box-shadow: none; cursor: not-allowed; }

        #chalk { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; font-weight: 900; opacity: 0; pointer-events: none; transition: 0.4s; }
    </style>
</head>
<body>

    <canvas id="gc"></canvas>
    
    <div id="ui-layer">
        <div id="hud">
            <div class="stat-box">
                <div id="turntxt">YOUR TURN</div>
            </div>
            <div class="stat-box">
                Wallet: $<span id="bal">100.00</span>
            </div>
        </div>

        <div id="chalk">POTTED!</div>

        <div id="ctrl">
            <div class="pw-container" id="pwtrack">
                <div id="pwfill"></div>
            </div>
            <button class="btn-shoot" id="shootbtn" onclick="APP.shoot()">SHOOT</button>
        </div>
    </div>

<script>
const APP = (function() {
    // --- Configuration ---
    const W = window.innerWidth, H = window.innerHeight;
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    const TX = W * 0.1, TY = H * 0.2, TW = W * 0.8, TH = H * 0.6;
    const BR = 14, PR = 22, FRIC = 0.985, MINV = 0.1;
    const PAD = { L: TX + 15, R: TX + TW - 15, T: TY + 15, B: TY + TH - 15 };

    // --- State ---
    let canvas, ctx, tableImg;
    let balls = [], pockets = [], parts = [];
    let cb, yourTurn = true, shooting = false, over = false;
    let angle = 0, power = 0.4, bal = 100.00;

    const BCOLS = ['#fff', '#f1c40f', '#2980b9', '#e74c3c', '#8e44ad', '#e67e22', '#27ae60', '#c0392b', '#000', '#f1c40f', '#2980b9', '#e74c3c', '#8e44ad', '#e67e22', '#27ae60', '#c0392b'];

    function setup() {
        canvas = document.getElementById('gc');
        canvas.width = W * DPR; canvas.height = H * DPR;
        canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
        ctx = canvas.getContext('2d');
        ctx.scale(DPR, DPR);

        pockets = [
            {x: TX, y: TY}, {x: TX + TW/2, y: TY}, {x: TX + TW, y: TY},
            {x: TX, y: TY + TH}, {x: TX + TW/2, y: TY + TH}, {x: TX + TW, y: TY + TH}
        ];

        bakeTable();
        initBalls();
        bindEvents();
        loop();
    }

    function bakeTable() {
        const oc = document.createElement('canvas');
        oc.width = W * DPR; oc.height = H * DPR;
        const c = oc.getContext('2d'); c.scale(DPR, DPR);
        
        // Background
        const g = c.createLinearGradient(0,0,0,H);
        g.addColorStop(0,'#060e06'); g.addColorStop(1,'#020502');
        c.fillStyle = g; c.fillRect(0,0,W,H);

        // Table Wood
        c.fillStyle = '#3d1c02';
        c.beginPath();
        c.roundRect(TX-25, TY-25, TW+50, TH+50, 20);
        c.fill();

        // Felt
        c.fillStyle = '#1a6832';
        c.beginPath();
        c.roundRect(TX, TY, TW, TH, 5);
        c.fill();

        // Pockets
        c.fillStyle = '#000';
        pockets.forEach(p => {
            c.beginPath(); c.arc(p.x, p.y, PR, 0, Math.PI*2); c.fill();
        });
        tableImg = oc;
    }

    function initBalls() {
        balls = [];
        cb = { num: 0, x: TX + TW * 0.25, y: TY + TH / 2, vx: 0, vy: 0, sunk: false };
        balls.push(cb);

        // Rack balls
        const startX = TX + TW * 0.65;
        const startY = TY + TH / 2;
        let count = 1;
        for(let r=0; r<5; r++) {
            for(let i=0; i<=r; i++) {
                balls.push({
                    num: count++,
                    x: startX + r * (BR * 2),
                    y: startY + (i - r/2) * (BR * 2.1),
                    vx: 0, vy: 0, sunk: false
                });
            }
        }
    }

    function physics() {
        let moving = false;
        balls.forEach(b => {
            if (b.sunk) return;
            b.x += b.vx; b.y += b.vy;
            b.vx *= FRIC; b.vy *= FRIC;
            if (Math.abs(b.vx) < 0.1) b.vx = 0;
            if (Math.abs(b.vy) < 0.1) b.vy = 0;
            if (b.vx || b.vy) moving = true;

            // Bounce
            if (b.x - BR < PAD.L || b.x + BR > PAD.R) b.vx *= -0.7;
            if (b.y - BR < PAD.T || b.y + BR > PAD.B) b.vy *= -0.7;

            // Pockets
            pockets.forEach(p => {
                if (Math.hypot(b.x - p.x, b.y - p.y) < PR) {
                    b.sunk = true; b.vx = 0; b.vy = 0;
                    chalk(b.num === 0 ? "SCRATCH!" : "POTTED!");
                }
            });
        });

        // Collisions
        for (let i = 0; i < balls.length; i++) {
            for (let j = i + 1; j < balls.length; j++) {
                const a = balls[i], b = balls[j];
                if (a.sunk || b.sunk) continue;
                const dist = Math.hypot(b.x - a.x, b.y - a.y);
                if (dist < BR * 2) {
                    const nx = (b.x - a.x) / dist, ny = (b.y - a.y) / dist;
                    const dot = (a.vx - b.vx) * nx + (a.vy - b.vy) * ny;
                    if (dot > 0) {
                        a.vx -= dot * nx; a.vy -= dot * ny;
                        b.vx += dot * nx; b.vy += dot * ny;
                    }
                }
            }
        }

        if (shooting && !moving) {
            shooting = false;
            yourTurn = !yourTurn;
            document.getElementById('turntxt').textContent = yourTurn ? "YOUR TURN" : "BOT TURN";
            if (!yourTurn) setTimeout(botShoot, 1000);
        }
    }

    function botShoot() {
        const target = balls.find(b => !b.sunk && b.num !== 0);
        if (target) {
            angle = Math.atan2(target.y - cb.y, target.x - cb.x);
            APP.shoot();
        }
    }

    function loop() {
        ctx.clearRect(0, 0, W, H);
        ctx.drawImage(tableImg, 0, 0, W*DPR, H*DPR, 0, 0, W, H);
        
        physics();

        balls.forEach(b => {
            if (b.sunk) return;
            ctx.beginPath();
            ctx.arc(b.x, b.y, BR, 0, Math.PI*2);
            ctx.fillStyle = BCOLS[b.num];
            ctx.fill();
            if (b.num > 0) {
                ctx.fillStyle = "#000";
                ctx.font = "bold 10px Arial";
                ctx.textAlign = "center";
                ctx.fillText(b.num, b.x, b.y + 4);
            }
        });

        if (yourTurn && !shooting) {
            ctx.beginPath();
            ctx.moveTo(cb.x, cb.y);
            ctx.lineTo(cb.x + Math.cos(angle) * 150, cb.y + Math.sin(angle) * 150);
            ctx.strokeStyle = "rgba(255,255,255,0.2)";
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        requestAnimationFrame(loop);
    }

    function bindEvents() {
        window.addEventListener('mousemove', (e) => {
            if (!shooting && yourTurn) angle = Math.atan2(e.clientY - cb.y, e.clientX - cb.x);
        });
        
        // Touch support
        window.addEventListener('touchmove', (e) => {
            if (!shooting && yourTurn) {
                const t = e.touches[0];
                angle = Math.atan2(t.clientY - cb.y, t.clientX - cb.x);
            }
        });
    }

    function chalk(msg) {
        const el = document.getElementById('chalk');
        el.textContent = msg; el.style.opacity = 1;
        setTimeout(() => el.style.opacity = 0, 1000);
    }

    return {
        init: setup,
        shoot: () => {
            if (shooting) return;
            const s = 15 * power;
            cb.vx = Math.cos(angle) * s;
            cb.vy = Math.sin(angle) * s;
            shooting = true;
        }
    };
})();

window.onload = APP.init;
</script>
</body>
</html>
